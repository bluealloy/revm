name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      cargo_features:
        description: "Optional Cargo features for cargo codspeed build, e.g. revm-precompile/gmp"
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  codspeed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
      - name: Install cargo-codspeed
        uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2.82.3
        with:
          tool: cargo-codspeed
      - name: Build the benchmark target(s)
        env:
          CARGO_FEATURES: ${{ inputs.cargo_features }}
        run: |
          if [ -n "$CARGO_FEATURES" ]; then
            cargo codspeed build --profile profiling --workspace --exclude '*example*' --features "$CARGO_FEATURES"
          else
            cargo codspeed build --profile profiling --workspace --exclude '*example*'
          fi
      - name: Run the benchmarks
        uses: CodSpeedHQ/action@a4a36bb07c0638b0b4ca52bf1f3dad1b4289e52f # v4.18.1
        with:
          run: cargo codspeed run --workspace
          token: ${{ secrets.CODSPEED_TOKEN }}
          mode: simulation
