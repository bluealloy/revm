name: Semver Checks

on:
  pull_request:
    branches: [main, "release/**"]

env:
  CARGO_TERM_COLOR: always

jobs:
  semver-checks:
    name: semver
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          exclude: revm-ee-tests
